<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Every Noise</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>every noise</h1>
        </header>
        <main>
            <div id="game-container">
                <div id="score-board">
                    <div class="score-item">
                        <span class="label">Score:</span>
                        <span id="score">0</span>
                    </div>
                    <div class="score-item">
                        <span class="label">Round:</span>
                        <span id="round">1/10</span>
                    </div>
                </div>

                <div id="audio-section">
                    <div id="audio-player">
                        <button id="play-btn" class="play-button">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"></polygon>
                            </svg>
                        </button>
                        <audio id="audio" preload="auto"></audio>
                    </div>
                    <p id="audio-hint">Click play to hear the sample</p>
                </div>

                <div id="question">
                    <h2>What genre is this?</h2>
                </div>

                <div id="options" class="options-grid"></div>

                <div id="feedback" class="feedback hidden"></div>

                <button id="next-btn" class="next-button hidden">Next Round</button>

                <div id="game-over" class="game-over hidden">
                    <h2>🎉 Game Over!</h2>
                    <p class="final-score">Your score: <span id="final-score">0</span>/10</p>
                    <button id="restart-btn" class="restart-button">Play Again</button>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="/main.js"></script>
</body>
</html>
